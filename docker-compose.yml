version: "3.8"

services:
  haruki-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haruki-static
    ports:
      - "8080:80"
    volumes:
      - haruki-repo:/data/repo
      - haruki-serve:/data/serve
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  haruki-repo:
  haruki-serve:
