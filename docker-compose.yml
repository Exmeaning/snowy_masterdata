version: '3.8'

services:
  haruki-server:
    build: .
    container_name: haruki-static-server
    ports:
      - "8080:80"
    volumes:
      - repo-data:/data
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  repo-data:
